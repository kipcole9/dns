# Build precompiled ExDns release tarballs and attach them to
# a GitHub Release.
#
# Triggered by pushing a `v*` tag (e.g. `git tag v0.2.0 && git push --tags`)
# and produces one tarball per (OS, arch) combination, named:
#
#   ex_dns-<version>-<os>-<arch>.tar.gz
#
# These are what the one-line installer
# (`contrib/install/install.sh`) downloads, so the naming and
# release-asset URLs are part of our public contract.
#
# Per CLAUDE.md "NIF precompile workflows" lessons:
# - `permissions: contents: write` is mandatory; the default
#   GITHUB_TOKEN is read-only.
# - Use `taiki-e/setup-cross-toolchain-action` instead of
#   `more.musl.cc` so the build doesn't break when that
#   infrastructure goes down.
# - Pin one OTP version per (NIF ABI, platform) combination
#   to avoid `softprops/action-gh-release` racing on the
#   shared release upload.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-22.04
            elixir: "1.17.3"
            otp: "27.1"

          - target: linux-aarch64
            runner: ubuntu-22.04
            elixir: "1.17.3"
            otp: "27.1"
            cross: aarch64-unknown-linux-gnu

          - target: macos-arm64
            runner: macos-14
            elixir: "1.17.3"
            otp: "27.1"

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Install cross toolchain
        if: matrix.cross != ''
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.cross }}

      - name: Set up BEAM
        if: matrix.runner != 'macos-14'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Set up BEAM (macOS via Homebrew)
        if: matrix.runner == 'macos-14'
        run: |
          brew install elixir@1.17 erlang@27
          echo "/opt/homebrew/opt/elixir@1.17/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/erlang@27/bin"   >> $GITHUB_PATH

      - name: Cache deps + _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build/prod
          key: ${{ matrix.target }}-${{ hashFiles('mix.lock') }}

      - name: Get + compile dependencies
        env:
          MIX_ENV: prod
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix deps.compile

      - name: Build the release
        env:
          MIX_ENV: prod
        run: |
          mix compile
          mix release ex_dns --overwrite

      - name: Rename tarball with target suffix
        run: |
          version=$(awk -F\" '/@version/ {print $2; exit}' mix.exs)
          src="_build/prod/ex_dns-${version}.tar.gz"
          dest="ex_dns-${version}-${{ matrix.target }}.tar.gz"
          cp "${src}" "${dest}"
          sha256sum "${dest}" > "${dest}.sha256"

      - name: Upload artefacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ex_dns-*.tar.gz
            ex_dns-*.tar.gz.sha256

  install-script:
    name: publish install script
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Attach install.sh to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            contrib/install/install.sh
